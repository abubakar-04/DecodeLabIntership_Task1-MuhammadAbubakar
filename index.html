<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow | Responsive Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div>
          <p class="eyebrow">DecodeLabs Project 1</p>
          <h1>TaskFlow</h1>
        </div>
        <p class="tagline">Plan, track, and clear your daily work.</p>
      </div>
    </header>

    <main class="container app-shell">
      <section class="task-panel" aria-labelledby="add-task-title">
        <div class="section-heading">
          <h2 id="add-task-title">New Task</h2>
          <p id="task-count">0 tasks remaining</p>
        </div>

        <form class="task-form" id="task-form">
          <label class="sr-only" for="task-input">Task name</label>
          <input
            id="task-input"
            class="task-input"
            type="text"
            placeholder="What needs to be done?"
            maxlength="120"
            autocomplete="off"
          />
          <button class="primary-btn" type="submit">Add Task</button>
        </form>

        <p class="form-message" id="form-message" role="alert"></p>
      </section>

      <nav class="filter-bar" aria-label="Task filters">
        <button class="filter-btn active" type="button" data-filter="all">
          All
        </button>
        <button class="filter-btn" type="button" data-filter="active">
          Active
        </button>
        <button class="filter-btn" type="button" data-filter="completed">
          Completed
        </button>
      </nav>

      <section class="task-list-section" aria-labelledby="task-list-title">
        <div class="section-heading">
          <h2 id="task-list-title">Tasks</h2>
          <button class="clear-btn" id="clear-completed" type="button">
            Clear Completed
          </button>
        </div>

        <div class="task-list" id="task-list" aria-live="polite"></div>

        <div class="empty-state" id="empty-state">
          <h3>No tasks yet</h3>
          <p>Add your first task to start organizing your day.</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>DecodeLabs Internship - Project 1</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
